<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>送信完了</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #34c759;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .message {
      font-size: 0.95rem;
      color: #3a3a3c;
      line-height: 1.6;
      margin-bottom: 0.75rem;
    }

    .email-highlight {
      display: inline-block;
      background: #f0f4ff;
      color: #0071e3;
      font-weight: 600;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      font-size: 0.95rem;
      margin: 0.25rem 0;
      word-break: break-all;
    }

    .back-link {
      display: inline-block;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: #0071e3;
      text-decoration: none;
      font-weight: 500;
    }

    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>

    <h1>送信が完了しました</h1>
    <p class="message">以下のメールアドレスに<br>確認メールを送信しました。</p>
    <span class="email-highlight" id="emailDisplay"></span>
    <p class="message" style="margin-top: 1rem; font-size: 0.85rem; color: #6e6e73;">
      メールが届かない場合は迷惑メールフォルダをご確認ください。
    </p>

    <a href="index.html" class="back-link">← お問い合わせフォームに戻る</a>
  </div>

  <script src="complete.js"></script>
</body>
</html>
